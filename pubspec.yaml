name: recipe_app
description: "Professional Recipe Discovery App - Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  provider: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.0.0
  
  # JSON serialization
  json_annotation: ^4.8.0
  
  # Navigation
  go_router: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  json_serializable: ^6.6.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/recipes_master.json

